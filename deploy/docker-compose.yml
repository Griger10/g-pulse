name: g_pulse
services:
  api:
    container_name: g_pulse_api
    build:
      context: ../services/api
      dockerfile: ../../deploy/Dockerfile
    command: "gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --workers 2"
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    container_name: g_pulse_db
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-pulseops}
      POSTGRES_USER: ${DATABASE_USER:-pulseops}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-pulseops}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  nginx:
    container_name: g_pulse_nginx
    build: ../nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

  redis:
    container_name: g_pulse_redis
    image: redis:latest
    restart: unless-stopped
    command:
      - redis-server

  nats:
    container_name: g_pulse_nats
    image: nats:latest
    entrypoint: /nats-server
    command: "-c /config/server.conf"
    restart: unless-stopped
    ports:
      - "4222:4222"
    volumes:
      - ../nats/data:/data
      - ../nats/config/server.conf:/config/server.conf

volumes:
  postgres_data:
